name: "CI — ビルド検証 & Lint"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm lint
      continue-on-error: true

    - name: Build
      run: pnpm build
      env:
        # ビルド時に必要な環境変数（ダミー値でOK、型チェックのため）
        NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy-anon-key-for-build"
        COOKIE_HMAC_SECRET: "dummy-secret-for-build"
        SUPABASE_SECRET_KEY: "dummy-secret-for-build"
